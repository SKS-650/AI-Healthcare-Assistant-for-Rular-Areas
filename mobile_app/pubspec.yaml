name: mobile_apps
description: AI Medical Voice Assistant — healthcare chatbot with voice, multilingual support and offline mode.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Core ──────────────────────────────────────────────────────────────────
  equatable: ^2.0.6
  http: ^1.2.2
  shared_preferences: ^2.2.3

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Voice / STT / TTS ─────────────────────────────────────────────────────
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  record: ^7.1.1
  audioplayers: ^6.0.0

  # ── Local Database (Offline cache) ────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI ────────────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  flutter_markdown: ^0.7.3
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.5.1
  permission_handler: ^11.3.1
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/audio/
    - assets/offline/chatbot/
    - assets/offline/education/
