[alembic]
# Run alembic from project root: python -m alembic -c backend/alembic.ini <cmd>
script_location = backend/migrations
prepend_sys_path = .

# Placeholder — overridden at runtime by migrations/env.py from .env
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/healthcare_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
